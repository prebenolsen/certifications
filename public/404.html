<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <!--
      GitHub Pages has no server-side SPA rewrite, so any deep link (e.g.
      /certifications/cert/x/module/y) 404s and lands here. We encode the
      requested path into a query string and bounce to the app root, where the
      snippet in index.html restores the real URL for React Router.
      `pathSegmentsToKeep = 1` keeps the /certifications/ project-site base.
      See https://github.com/rafgraph/spa-github-pages.
    -->
    <script>
      ;(function (l) {
        var pathSegmentsToKeep = 1
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname
              .split('/')
              .slice(0, 1 + pathSegmentsToKeep)
              .join('/') +
            '/?/' +
            l.pathname
              .slice(1)
              .split('/')
              .slice(pathSegmentsToKeep)
              .join('/')
              .replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash,
        )
      })(window.location)
    </script>
  </head>
  <body></body>
</html>
